name: Visual Baselines

# One-off / on-demand: generate the Linux visual-regression baselines and commit them, so the nightly
# "Visual Regression" job can do a real comparison. Run from the Actions tab (Run workflow) after a
# deliberate UI change. Baselines are screenshots of the public UI - no secrets - safe to commit.
on:
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  NEXT_PUBLIC_SUPABASE_URL: 'https://dummy.supabase.co'
  NEXT_PUBLIC_SUPABASE_ANON_KEY: 'ci-placeholder-anon-key'

jobs:
  generate:
    name: Generate + commit baselines
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Generate baselines
        # First-time snapshot writes are reported as a non-zero "did not match / was written" result;
        # we only want the PNGs, so this step is allowed to be non-green.
        run: npx playwright test tests/visual.spec.ts --update-snapshots
        env:
          CI: true
        continue-on-error: true

      # main is a protected branch (requires the "CI Success" check), so the github-actions bot cannot
      # push directly. Publish the freshly-generated Linux baselines as an artifact instead; a
      # maintainer downloads it and commits the PNGs (an admin push bypasses the protection). This
      # keeps the workflow green and the baseline change reviewable.
      - name: Upload regenerated baselines
        uses: actions/upload-artifact@v7
        with:
          name: visual-baselines-linux
          path: tests/visual.spec.ts-snapshots/
          retention-days: 7
          if-no-files-found: error
