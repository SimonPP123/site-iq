name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  # Public, non-secret placeholders so `next build` and the dev server boot in CI without real
  # credentials. The Supabase client only needs a well-formed URL + key to construct; nothing here
  # makes real calls during lint/typecheck/build/unit. Real keys live in Vercel + n8n, never in CI.
  NEXT_PUBLIC_SUPABASE_URL: 'https://dummy.supabase.co'
  NEXT_PUBLIC_SUPABASE_ANON_KEY: 'ci-placeholder-anon-key'

jobs:
  # Job 1: Quick quality checks (lint, typecheck, build)
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Build application
        run: npm run build

      - name: Bundle size budget
        run: |
          # Generous ceiling that trips only on a gross regression (e.g. an accidental heavy dependency),
          # not normal growth. Counts shipped client JS only (raw, excludes source maps). Tighten once a
          # real baseline is measured - see docs/DEPLOYMENT.md "Ops".
          BUDGET_KB=8000
          SIZE_KB=$(find .next/static -type f -name '*.js' ! -name '*.map' -exec du -k {} + | awk '{s+=$1} END {print s+0}')
          echo "Client JS: ${SIZE_KB} KB (budget ${BUDGET_KB} KB)"
          echo "- Client JS: ${SIZE_KB} KB / ${BUDGET_KB} KB budget" >> "$GITHUB_STEP_SUMMARY"
          if [ "$SIZE_KB" -gt "$BUDGET_KB" ]; then
            echo "::error::Client JS ${SIZE_KB} KB exceeds budget ${BUDGET_KB} KB"
            exit 1
          fi

      - name: Security audit (production deps, blocking on high)
        # Gate on runtime dependencies only (what actually ships); dev-tooling advisories are reported by
        # the weekly Maintenance workflow at the moderate level instead of blocking every push.
        run: npm audit --omit=dev --audit-level=high

  # Job 2: Unit tests with coverage
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Job 3: E2E tests with Playwright.
  # E2E drives a live dev server and exercises auth, so it needs a real Supabase project. It is
  # therefore opt-in: set the repository variable RUN_E2E=true (with real env wired in) to run it in
  # CI. Locally it runs with your .env.local via `npm run test:e2e`. Gating it keeps CI green and
  # honest rather than running auth flows against placeholder credentials.
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_E2E == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Job 4: Lighthouse CI (performance budget) - advisory, never blocks.
  lighthouse:
    name: Performance Budget
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun
        continue-on-error: true

  # Job 5: Migration replay. Boots the full Supabase local stack (Docker) and replays every migration
  # from clean + the seed, so a broken or out-of-order migration fails CI instead of the live project.
  # Needs no real credentials - the local stack ships its own auth/realtime/pgvector.
  migrations:
    name: Migration Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local stack
        run: supabase start

      - name: Replay migrations from clean + seed
        # `db reset` drops the local DB and re-applies supabase/migrations/*.sql in order, then runs
        # supabase/seed.sql. A non-zero exit here means a migration is broken.
        run: supabase db reset

  # Job 6: Secret scan. Fails the build if any credential pattern is committed - the public mirror
  # (SimonPP123/site-iq) must stay scrubbed. Allowlist for known placeholders is in .gitleaks.toml.
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      # Run gitleaks via its official Docker image rather than the Node action: it has no Node-runtime
      # dependency (survives GitHub's June-2026 Node-20 -> 24 cutover that would otherwise break this
      # required gate) and needs no GitHub token / PR-API permissions. Scans the checked-out tree.
      - name: Run gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --no-git --config=/repo/.gitleaks.toml --redact --exit-code=1

  # Final status gate. Required jobs are the ones that run on every push and must be green; e2e is
  # opt-in (see above) and Lighthouse is advisory, so neither gates the build.
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, migrations, secret-scan]
    if: always()
    steps:
      - name: Check required jobs passed
        run: |
          if [[ "${{ needs.quality.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.migrations.result }}" != "success" ]] || \
             [[ "${{ needs.secret-scan.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required CI checks passed!"
